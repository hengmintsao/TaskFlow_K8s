replicaCount: 1

image:
  repository: taskflow-backend
  tag: latest
  pullPolicy: IfNotPresent

nameOverride: ""
fullnameOverride: ""

service:
  type: ClusterIP
  port: 3001
  targetPort: 3001

config:
  apiUrl: http://taskflow-backend:3001
  nodeEnv: production

secrets:
  dbUser: postgres
  dbPassword: postgres
  dbName: taskflow_db
  dbHost: taskflow-postgres
  dbPort: 5432

resources:
  limits:
    cpu: 500m
    memory: 256Mi
  requests:
    cpu: 100m
    memory: 128Mi

nodeSelector: {}
tolerations: []
affinity: {}
